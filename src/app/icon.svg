<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background: deep dark-violet rounded square -->
  <rect width="32" height="32" rx="7" fill="#09091A"/>

  <!-- Subtle violet radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#7B6EF6" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#09091A" stop-opacity="0"/>
  </radialGradient>
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>

  <!-- Left angle bracket < -->
  <path d="M7 16 L12 10.5" stroke="#7B6EF6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M7 16 L12 21.5" stroke="#7B6EF6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right angle bracket > -->
  <path d="M25 16 L20 10.5" stroke="#7B6EF6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M25 16 L20 21.5" stroke="#7B6EF6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Slash / in gold -->
  <path d="M19 9.5 L13 22.5" stroke="#C49A3C" stroke-width="2.2" stroke-linecap="round"/>
</svg>
